<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>賽考利克泰雅語學習系統 - 流程優化版</title>
    <style>
        :root { --primary: #b32428; --bg: #f8f9fa; --dark: #2c3e50; --border: #ddd; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--dark); display: flex; justify-content: center; }
        .container { width: 100%; max-width: 800px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        header { text-align: center; border-bottom: 3px solid var(--primary); margin-bottom: 25px; padding-bottom: 15px; }
        h1 { color: var(--primary); margin: 0 0 10px 0; }
        
        #upload-area { border: 2px dashed var(--primary); padding: 40px; text-align: center; border-radius: 10px; background: #fff5f5; margin-bottom: 20px; transition: 0.3s; cursor: pointer; }
        #upload-area.hover { background: #ffebeb; border-style: solid; }
        #file-input { display: none; }
        .upload-btn { background: var(--primary); color: white; padding: 12px 25px; border-radius: 8px; cursor: pointer; display: inline-block; font-weight: bold; margin-top: 15px; }
        
        .setup-box { display: none; flex-direction: column; gap: 15px; }
        select, button { padding: 12px; font-size: 16px; border-radius: 8px; border: 1px solid var(--border); }
        button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover:not(:disabled) { filter: brightness(1.1); transform: translateY(-2px); }
        button:disabled { background: #ccc; cursor: not-allowed; transform: none; color: #666; }
        
        .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .review-btn { grid-column: span 2; background: #e67e22; font-size: 1.1rem; }
        
        #game-area { display: none; text-align: center; min-height: 400px; }
        .info-bar { display: flex; justify-content: space-between; padding: 12px; background: #eee; border-radius: 8px; margin-bottom: 25px; font-weight: bold; }
        
        .word-display { margin: 40px 0; }
        #main-word { font-size: 3.5rem; font-weight: bold; color: var(--primary); margin-bottom: 10px; word-break: break-all; }
        #sub-word { font-size: 1.5rem; color: #666; min-height: 1.5em; }
        
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .opt-btn { background: #fdfdfd; color: var(--dark); border: 2px solid #eee; font-size: 1.2rem; padding: 15px; }
        .opt-btn.correct-select { border-color: #27ae60; background: #e8f5e9; }
        .opt-btn.wrong-select { border-color: #e74c3c; background: #fdeaea; }
        
        input[type="text"] { width: 85%; padding: 15px; font-size: 1.3rem; margin-bottom: 15px; text-align: center; border: 2px solid var(--border); border-radius: 8px; }
        
        #feedback { font-size: 1.3rem; font-weight: bold; margin: 20px 0; min-height: 1.5em; }
        .correct { color: #27ae60; }
        .wrong { color: #e74c3c; }
        
        .footer-btns { margin-top: 30px; display: flex; justify-content: space-between; align-items: center; }
        .secondary { background: #6c757d; }
        .nav-group { display: flex; gap: 10px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Squliq Atayal 學習系統</h1>
        <p>分段 Enter 提交機制 (修正連跳問題)</p>
    </header>

    <div id="upload-area" onclick="document.getElementById('file-input').click()">
        <h3>📂 第一步：載入單字檔</h3>
        <p>將 CSV 檔案<b>拖曳到此處</b>，或點擊選擇檔案</p>
        <label for="file-input" class="upload-btn">選擇 CSV 檔案</label>
        <input type="file" id="file-input" accept=".csv">
    </div>

    <div id="setup-area" class="setup-box">
        <div style="background: #e8f5e9; color: #2e7d32; padding: 10px; border-radius: 5px; text-align: center; font-weight: bold;">
            ✅ 成功載入！共讀取 <span id="total-words-count">0</span> 個單字。
        </div>
        <label><b>1. 選擇單元類別：</b></label>
        <select id="category-select"></select>
        <label><b>2. 選擇練習模式：</b></label>
        <div class="mode-grid">
            <button onclick="startGame('study')">📖 學習模式 (看卡片)</button>
            <button onclick="startGame('choice')">🔍 選擇題模式</button>
            <button onclick="startGame('fill-ty')">✏️ 中翻族 (填空)</button>
            <button onclick="startGame('fill-zh')">✏️ 族翻中 (填空)</button>
            <button id="review-btn" class="review-btn" onclick="startGame('review')" disabled>🔒 錯題特訓 (解鎖中...)</button>
        </div>
        <div id="mistake-status" style="text-align: center; font-size: 0.9rem; color: #888; margin-top: 5px;">目前填空作答次數：0/5 次</div>
    </div>

    <div id="game-area">
        <div class="info-bar">
            <span id="cur-cat">類別</span>
            <span id="progress">0 / 0</span>
            <span id="score-display">得分: 0</span>
        </div>
        <div class="word-display">
            <div id="main-word">---</div>
            <div id="sub-word"></div>
        </div>
        <div id="action-zone"></div>
        <div id="feedback"></div>
        <div class="footer-btns">
            <button class="secondary" onclick="exitGame()">返回選單</button>
            <div class="nav-group">
                <button id="prev-btn" class="secondary" onclick="handlePrev()" style="display: none;">上一個</button>
                <button id="next-btn" onclick="handleNext()">下一項 (Enter)</button>
            </div>
        </div>
    </div>
</div>

<script>
let ALL_WORDS = []; 
let state = { mode: '', category: '', pool: [], idx: 0, score: 0, isAnswered: false, currentCorrectAns: "" };

// --- 資料儲存 ---
let fillAttempts = parseInt(localStorage.getItem('atayal_fill_attempts')) || 0;
let mistakesDB = JSON.parse(localStorage.getItem('atayal_mistakes')) || {};

function updateReviewUI() {
    const reviewBtn = document.getElementById('review-btn');
    const statusText = document.getElementById('mistake-status');
    const mistakeCount = Object.keys(mistakesDB).length;
    if (fillAttempts >= 5) {
        reviewBtn.disabled = mistakeCount === 0;
        reviewBtn.innerText = mistakeCount > 0 ? `🔥 錯題特訓 (${mistakeCount} 個待複習)` : `🔥 錯題特訓 (目前無錯題)`;
    }
    statusText.innerText = fillAttempts >= 5 ? `系統已記錄您的易錯單字。` : `目前填空作答次數：${fillAttempts} / 5 次 (解鎖特訓用)`;
}

// --- 檔案功能 ---
const uploadArea = document.getElementById('upload-area');
const fileInput = document.getElementById('file-input');
uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.classList.add('hover'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('hover'));
uploadArea.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadArea.classList.remove('hover');
    if(e.dataTransfer.files.length) processFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', (e) => { if(e.target.files.length) processFile(e.target.files[0]); });

function processFile(file) {
    const reader = new FileReader();
    reader.onload = (e) => parseCSV(e.target.result);
    reader.readAsText(file);
}

function parseCSV(csvText) {
    ALL_WORDS = [];
    const lines = csvText.split(/\r?\n/);
    let currentCategory = "未分類";
    for (let line of lines) {
        let cols = line.split(',');
        if (cols.length < 3) continue;
        let c0 = cols[0].trim(), c1 = cols[1].trim(), c2 = cols[2].trim(), c3 = cols[3]?.trim();
        if (c0 === "類別") { currentCategory = c1; continue; }
        if (c2 === "中文" || !c2 || !c3) continue;
        ALL_WORDS.push({ c: currentCategory, z: c2, t: c3 });
    }
    initMenu();
}

function initMenu() {
    const sel = document.getElementById('category-select');
    sel.innerHTML = '';
    const categories = [...new Set(ALL_WORDS.map(w => w.c))].sort();
    categories.forEach(cat => {
        const opt = document.createElement('option');
        opt.value = cat;
        opt.innerText = `${cat} (${ALL_WORDS.filter(w=>w.c===cat).length} 詞)`;
        sel.appendChild(opt);
    });
    document.getElementById('upload-area').style.display = 'none';
    document.getElementById('setup-area').style.display = 'flex';
    document.getElementById('total-words-count').innerText = ALL_WORDS.length;
    updateReviewUI();
}

// --- Enter 鍵核心邏輯修正 ---
window.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
        const isGameVisible = document.getElementById('game-area').style.display === 'block';
        if (!isGameVisible) return;

        if (state.mode === 'study') {
            handleNext();
        } else {
            // 在填空題中，如果還沒回答，由 input 自己的事件處理
            // 如果已經回答完了，按 Enter 進入下一題
            if (state.isAnswered) {
                handleNext();
            } else if (state.mode === 'choice') {
                // 選擇題沒選之前 Enter 不作用，避免誤跳
            }
        }
    }
});

function normalize(str) {
    return str ? str.trim().toLowerCase().replace(/[’‘’`]/g, "'") : "";
}

function startGame(mode) {
    state = { mode, idx: 0, score: 0, isAnswered: false, currentCorrectAns: "" };
    if (mode === 'review') {
        state.category = "錯題特訓總匯";
        state.pool = Object.values(mistakesDB).sort((a,b) => b.count - a.count);
    } else {
        state.category = document.getElementById('category-select').value;
        state.pool = ALL_WORDS.filter(w => w.c === state.category);
        shuffle(state.pool);
    }
    document.getElementById('setup-area').style.display = 'none';
    document.getElementById('game-area').style.display = 'block';
    document.getElementById('cur-cat').innerText = state.category;
    document.getElementById('score-display').style.visibility = (mode === 'study' ? 'hidden' : 'visible');
    renderStep();
}

function handlePrev() { if (state.idx > 0) { state.idx--; renderStep(); } }
function handleNext() { 
    state.idx++; 
    renderStep(); 
}

function renderStep() {
    if(state.idx >= state.pool.length) {
        alert(`🎉 練習完成！\n得分：${state.score} / ${state.pool.length}`);
        exitGame();
        return;
    }
    const item = state.pool[state.idx];
    const main = document.getElementById('main-word'), sub = document.getElementById('sub-word');
    const zone = document.getElementById('action-zone'), feedback = document.getElementById('feedback');
    const nextBtn = document.getElementById('next-btn'), prevBtn = document.getElementById('prev-btn');

    zone.innerHTML = ''; feedback.innerText = ''; state.isAnswered = false;
    document.getElementById('progress').innerText = `${state.idx + 1} / ${state.pool.length}`;
    document.getElementById('score-display').innerText = `得分: ${state.score}`;

    if(state.mode === 'study') {
        main.innerText = item.t; sub.innerText = item.z;
        nextBtn.innerText = '下一項 (Enter)'; nextBtn.disabled = false;
        prevBtn.style.display = 'inline-block'; prevBtn.disabled = (state.idx === 0);
    } 
    else if(state.mode === 'choice') {
        main.innerText = item.z; sub.innerText = '';
        nextBtn.innerText = '請先選擇答案'; nextBtn.disabled = true;
        prevBtn.style.display = 'none';
        state.currentCorrectAns = item.t;
        const options = generateOptions(item.t);
        const grid = document.createElement('div');
        grid.className = 'options-grid';
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn'; btn.innerText = opt;
            btn.onclick = () => { if(!state.isAnswered) checkAnswer(opt, item.t, item, btn); };
            grid.appendChild(btn);
        });
        zone.appendChild(grid);
    } 
    else {
        let isTy = state.mode === 'fill-ty' || (state.mode === 'review' && Math.random() > 0.5);
        main.innerText = isTy ? item.z : item.t; sub.innerText = '';
        nextBtn.innerText = '請輸入並按 Enter 提交'; nextBtn.disabled = true;
        prevBtn.style.display = 'none';
        const correctAns = isTy ? item.t : item.z;
        const input = document.createElement('input');
        input.type = 'text'; input.placeholder = isTy ? "輸入族語..." : "輸入中文...";
        input.id = 'user-input'; input.autocomplete = 'off';
        
        // 填空題專屬 Enter 邏輯：第一次提交，第二次下一題
        input.onkeydown = (e) => { 
            if(e.key === 'Enter') {
                e.stopPropagation(); // 防止觸發全域的 handleNext
                if(!state.isAnswered) {
                    checkAnswer(input.value, correctAns, item);
                } else {
                    handleNext();
                }
            }
        };
        
        zone.appendChild(input);
        input.focus();
    }
}

function checkAnswer(user, correct, item, targetBtn = null) {
    if(state.isAnswered) return;
    state.isAnswered = true;
    const feedback = document.getElementById('feedback'), nextBtn = document.getElementById('next-btn');
    const isCorrect = normalize(user) === normalize(correct);
    
    // 錯題與次數記錄
    if (state.mode.includes('fill') || state.mode === 'review') {
        fillAttempts++;
        localStorage.setItem('atayal_fill_attempts', fillAttempts);
        if (!isCorrect) {
            if (!mistakesDB[item.t]) mistakesDB[item.t] = { c: item.c, z: item.z, t: item.t, count: 0 };
            mistakesDB[item.t].count++;
        } else if (state.mode === 'review' && mistakesDB[item.t]) {
            mistakesDB[item.t].count--;
            if (mistakesDB[item.t].count <= 0) delete mistakesDB[item.t];
        }
        localStorage.setItem('atayal_mistakes', JSON.stringify(mistakesDB));
    }

    if(isCorrect) {
        feedback.innerText = '太棒了！答對了 ✨'; feedback.className = 'correct';
        state.score++;
        if(targetBtn) targetBtn.classList.add('correct-select');
    } else {
        feedback.innerText = `可惜錯了，正確答案是：${correct}`; feedback.className = 'wrong';
        if(targetBtn) targetBtn.classList.add('wrong-select');
    }
    
    nextBtn.disabled = false; 
    nextBtn.innerText = '下一項 (再次按 Enter)'; 
    const input = document.getElementById('user-input');
    if(input) input.disabled = true;
    document.querySelectorAll('.opt-btn').forEach(el => el.disabled = true);
}

function generateOptions(correct) {
    const all = ALL_WORDS.map(w => w.t);
    const opts = new Set([correct]);
    while(opts.size < 4 && opts.size < all.length) opts.add(all[Math.floor(Math.random() * all.length)]);
    return shuffle([...opts]);
}

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function exitGame() {
    document.getElementById('game-area').style.display = 'none';
    document.getElementById('setup-area').style.display = 'flex';
    updateReviewUI();
}
</script>
</body>
</html>
