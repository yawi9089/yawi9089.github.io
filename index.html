<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Squliq Atayal 學習系統 v3.0</title>
    <style>
        :root { --primary: #b32428; --bg: #f8f9fa; --dark: #2c3e50; --border: #ddd; --success: #27ae60; --warning: #e67e22; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Microsoft JhengHei", sans-serif; background: var(--bg); margin: 0; padding: 10px; color: var(--dark); line-height: 1.4; }
        .container { width: 100%; max-width: 700px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin: 0 auto; box-sizing: border-box; }
        
        header { text-align: center; border-bottom: 3px solid var(--primary); margin-bottom: 15px; padding-bottom: 10px; }
        h1 { color: var(--primary); font-size: 1.4rem; margin: 0; }
        
        /* 進度條樣式 */
        .stats-panel { background: #fff5f5; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #ffebeb; }
        .progress-container { background: #eee; height: 12px; border-radius: 6px; margin: 10px 0; overflow: hidden; }
        .progress-bar { background: var(--success); height: 100%; width: 0%; transition: 0.5s; }
        .stats-text { display: flex; justify-content: space-between; font-size: 0.85rem; font-weight: bold; }

        /* 上傳與搜尋區 */
        #upload-area { border: 2px dashed var(--primary); padding: 30px 15px; text-align: center; border-radius: 10px; cursor: pointer; background: #fffdfd; }
        #upload-area.hover { background: #ffebeb; }
        #file-input { display: none; }

        .search-box { margin: 15px 0; display: flex; gap: 5px; }
        .search-box input { flex: 1; padding: 10px; border: 1px solid var(--border); border-radius: 8px; }

        /* 模式選單 */
        .setup-box { display: none; flex-direction: column; gap: 12px; }
        .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 12px; font-size: 1rem; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-review { background: var(--warning); color: white; grid-column: 1 / -1; }
        .btn-dict { background: var(--dark); color: white; grid-column: 1 / -1; }
        button:disabled { background: #ccc !important; transform: none !important; }

        /* 字典模式 */
        #dict-area { display: none; margin-top: 10px; max-height: 400px; overflow-y: auto; border: 1px solid var(--border); border-radius: 8px; }
        .dict-item { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; font-size: 0.95rem; }
        .dict-item:nth-child(even) { background: #f9f9f9; }

        /* 遊戲區域 */
        #game-area { display: none; text-align: center; }
        .word-display { margin: 25px 0; }
        #main-word { font-size: 2.2rem; font-weight: bold; color: var(--primary); margin-bottom: 5px; word-break: break-word; }
        #sub-word { font-size: 1.1rem; color: #666; min-height: 1.5em; }
        
        input[type="text"] { width: 100%; padding: 15px; font-size: 1.2rem; margin-bottom: 10px; border: 2px solid var(--border); border-radius: 8px; box-sizing: border-box; text-align: center; }
        
        .hint-text { color: var(--warning); font-size: 0.9rem; margin-top: 5px; font-weight: bold; }
        #feedback { font-size: 1.1rem; font-weight: bold; margin: 15px 0; min-height: 1.2em; }
        
        .footer-btns { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .nav-group { display: flex; gap: 10px; }
        .nav-group button { flex: 1; }
        .secondary { background: #6c757d; color: white; }

        /* 響應式微調 */
        @media (min-width: 500px) {
            h1 { font-size: 1.8rem; }
            #main-word { font-size: 3rem; }
            .footer-btns { flex-direction: row; justify-content: space-between; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Squliq Atayal 學習系統</h1>
    </header>

    <div class="stats-panel" id="stats-panel" style="display:none;">
        <div class="stats-text">
            <span>學習進度 (已掌握)</span>
            <span id="mastery-percent">0%</span>
        </div>
        <div class="progress-container">
            <div class="progress-bar" id="mastery-bar"></div>
        </div>
        <div class="stats-text" style="font-weight: normal; font-size: 0.75rem; color: #666;">
            <span id="mastery-count">已掌握: 0 / 0 詞</span>
            <span id="mistake-count">待複習: 0 詞</span>
        </div>
    </div>

    <div id="upload-area" onclick="document.getElementById('file-input').click()">
        <h3>📂 載入單字 CSV 檔案</h3>
        <p style="font-size:0.9rem; color: #666;">支援電腦拖曳與手機點擊選檔</p>
        <input type="file" id="file-input" accept=".csv, text/csv">
    </div>

    <div id="setup-area" class="setup-box">
        <div class="search-box">
            <input type="text" id="global-search" placeholder="🔍 快速搜尋單字 (中/族)..." oninput="handleGlobalSearch()">
        </div>
        
        <div id="dict-area"></div>

        <label><b>選擇單元：</b></label>
        <select id="category-select" style="padding:10px; border-radius:8px;"></select>
        
        <div class="mode-grid">
            <button class="btn-primary" onclick="startGame('study')">📖 學習卡片</button>
            <button class="btn-primary" onclick="startGame('choice')">🔍 選擇題</button>
            <button class="btn-primary" onclick="startGame('fill-ty')">✏️ 中翻族</button>
            <button class="btn-primary" onclick="startGame('fill-zh')">✏️ 族翻中</button>
            <button id="review-btn" class="btn-review" onclick="startGame('review')" disabled>🔥 錯題特訓</button>
            <button class="btn-dict" onclick="toggleDictionary()">📖 查看完整詞表 / 搜尋</button>
        </div>
    </div>

    <div id="game-area">
        <div style="display:flex; justify-content: space-between; font-size:0.8rem; color:#888; margin-bottom:10px;">
            <span id="cur-cat"></span>
            <span id="progress-text"></span>
        </div>
        <div class="word-display">
            <div id="main-word">---</div>
            <div id="sub-word"></div>
        </div>
        <div id="action-zone"></div>
        <div id="feedback"></div>
        <div id="typo-hint" class="hint-text"></div>
        <div class="footer-btns">
            <div class="nav-group">
                <button id="prev-btn" class="secondary" onclick="handlePrev()" style="display:none;">上一個</button>
                <button id="next-btn" class="btn-primary" onclick="handleNext()">下一項 (Enter)</button>
            </div>
            <button class="secondary" onclick="exitGame()">離開</button>
        </div>
    </div>
</div>

<script>
// --- 全域變數 ---
let ALL_WORDS = [];
let state = { mode: '', pool: [], idx: 0, score: 0, isAnswered: false, lastEnterTime: 0 };
let mistakesDB = JSON.parse(localStorage.getItem('atayal_mistakes_v3')) || {};
let masteredDB = JSON.parse(localStorage.getItem('atayal_mastered_v3')) || []; // 存族語原文作為 Key

// --- 檔案處理 (支援 PC 拖曳 & 手機點擊) ---
const uploadArea = document.getElementById('upload-area');
uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.classList.add('hover'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('hover'));
uploadArea.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadArea.classList.remove('hover');
    if(e.dataTransfer.files.length) processFile(e.dataTransfer.files[0]);
});
document.getElementById('file-input').onchange = (e) => { if(e.target.files.length) processFile(e.target.files[0]); };

function processFile(file) {
    const reader = new FileReader();
    reader.onload = (e) => parseCSV(e.target.result);
    reader.readAsText(file, 'UTF-8');
}

// 強化版 CSV 解析 (處理引號與逗號)
function parseCSV(text) {
    ALL_WORDS = [];
    const lines = text.split(/\r?\n/);
    let currentCat = "未分類";
    lines.forEach(line => {
        const parts = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/); // Regex 處理引號內逗號
        if (parts.length < 3) return;
        let c0 = parts[0].replace(/"/g, '').trim();
        let c1 = parts[1]?.replace(/"/g, '').trim();
        let c2 = parts[2]?.replace(/"/g, '').trim(); // 中文
        let c3 = parts[3]?.replace(/"/g, '').trim(); // 族語
        
        if (c0 === "類別") { currentCat = c1; return; }
        if (c2 === "中文" || !c2 || !c3) return;
        ALL_WORDS.push({ c: currentCat, z: c2, t: c3 });
    });
    
    syncMistakeBank();
    initUI();
}

// --- 功能 2：錯題本極端狀況處理 (同步現有詞庫) ---
function syncMistakeBank() {
    const currentT_Set = new Set(ALL_WORDS.map(w => w.t));
    for (let key in mistakesDB) {
        if (!currentT_Set.has(key)) delete mistakesDB[key]; // 刪除不存在於新 CSV 的錯題
    }
    localStorage.setItem('atayal_mistakes_v3', JSON.stringify(mistakesDB));
}

function initUI() {
    document.getElementById('upload-area').style.display = 'none';
    document.getElementById('setup-area').style.display = 'flex';
    document.getElementById('stats-panel').style.display = 'block';
    
    const sel = document.getElementById('category-select');
    sel.innerHTML = '';
    const cats = [...new Set(ALL_WORDS.map(w => w.c))];
    cats.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c;
        opt.innerText = `${c} (${ALL_WORDS.filter(w=>w.c===c).length} 詞)`;
        sel.appendChild(opt);
    });
    updateStats();
}

// --- 功能 5：學習進度條與成就 ---
function updateStats() {
    const total = ALL_WORDS.length;
    const mastered = masteredDB.filter(t => ALL_WORDS.some(w => w.t === t)).length;
    const percent = total > 0 ? Math.round((mastered / total) * 100) : 0;
    
    document.getElementById('mastery-bar').style.width = percent + '%';
    document.getElementById('mastery-percent').innerText = percent + '%';
    document.getElementById('mastery-count').innerText = `已掌握: ${mastered} / ${total} 詞`;
    
    const mistakeCount = Object.keys(mistakesDB).length;
    document.getElementById('mistake-count').innerText = `待複習: ${mistakeCount} 詞`;
    document.getElementById('review-btn').disabled = (mistakeCount === 0);
}

// --- 功能 3：字典與搜尋模式 ---
function toggleDictionary() {
    const area = document.getElementById('dict-area');
    area.style.display = (area.style.display === 'block') ? 'none' : 'block';
    if(area.style.display === 'block') handleGlobalSearch();
}

function handleGlobalSearch() {
    const q = document.getElementById('global-search').value.toLowerCase();
    const area = document.getElementById('dict-area');
    const filtered = ALL_WORDS.filter(w => w.z.toLowerCase().includes(q) || w.t.toLowerCase().includes(q)).slice(0, 50);
    
    area.innerHTML = filtered.map(w => `
        <div class="dict-item">
            <span style="color:var(--primary); font-weight:bold;">${w.t}</span>
            <span>${w.z}</span>
        </div>
    `).join('');
}

// --- 功能 1：Enter 鍵手機優化 (防止連跳) ---
window.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
        const now = Date.now();
        if (now - state.lastEnterTime < 300) return; // 300ms 防抖
        state.lastEnterTime = now;

        if (document.getElementById('game-area').style.display === 'block') {
            if (state.mode === 'study' || state.isAnswered) {
                handleNext();
            }
        }
    }
});

function startGame(mode) {
    state.mode = mode; state.idx = 0; state.score = 0; state.isAnswered = false;
    if (mode === 'review') {
        state.pool = Object.values(mistakesDB).sort((a,b) => b.count - a.count);
    } else {
        const cat = document.getElementById('category-select').value;
        state.pool = [...ALL_WORDS.filter(w => w.c === cat)];
        shuffle(state.pool);
    }
    document.getElementById('setup-area').style.display = 'none';
    document.getElementById('game-area').style.display = 'block';
    renderStep();
}

function renderStep() {
    if(state.idx >= state.pool.length) {
        alert(`完成練習！得分：${state.score}/${state.pool.length}`);
        exitGame(); return;
    }
    const item = state.pool[state.idx];
    state.isAnswered = false;
    document.getElementById('main-word').innerText = (state.mode === 'fill-zh' ? item.t : item.z);
    document.getElementById('sub-word').innerText = (state.mode === 'study' ? item.t : '');
    document.getElementById('progress-text').innerText = `${state.idx+1} / ${state.pool.length}`;
    document.getElementById('cur-cat').innerText = item.c;
    document.getElementById('feedback').innerText = '';
    document.getElementById('typo-hint').innerText = '';
    
    const zone = document.getElementById('action-zone');
    zone.innerHTML = '';
    const nextBtn = document.getElementById('next-btn');
    nextBtn.innerText = state.mode === 'study' ? '下一項 (Enter)' : '提交答案 (Enter)';

    if(state.mode === 'study') {
        document.getElementById('main-word').innerText = item.t;
        document.getElementById('sub-word').innerText = item.z;
    } else if(state.mode === 'choice') {
        const opts = generateOptions(item.t);
        opts.forEach(opt => {
            const b = document.createElement('button');
            b.className = 'btn-primary'; b.style.width = '100%'; b.style.marginBottom = '8px';
            b.innerText = opt;
            b.onclick = () => checkAnswer(opt, item.t, item, b);
            zone.appendChild(b);
        });
    } else {
        const input = document.createElement('input');
        input.type = 'text'; input.placeholder = '請輸入答案...';
        input.onkeydown = (e) => { 
            if(e.key === 'Enter') { e.stopPropagation(); if(!state.isAnswered) checkAnswer(input.value, (state.mode==='fill-ty'?item.t:item.z), item); else handleNext(); }
        };
        zone.appendChild(input);
        if(window.innerWidth > 768) input.focus();
    }
}

// --- 功能 4：拼字容錯機制 (Levenshtein) ---
function getLevenshtein(a, b) {
    const tmp = [];
    for (let i = 0; i <= a.length; i++) tmp[i] = [i];
    for (let j = 0; j <= b.length; j++) tmp[0][j] = j;
    for (let i = 1; i <= a.length; i++) {
        for (let j = 1; j <= b.length; j++) {
            tmp[i][j] = Math.min(tmp[i-1][j]+1, tmp[i][j-1]+1, tmp[i-1][j-1] + (a[i-1]===b[j-1]?0:1));
        }
    }
    return tmp[a.length][b.length];
}

function checkAnswer(user, correct, item, btn = null) {
    if(state.isAnswered) return;
    state.isAnswered = true;
    const u = user.trim().toLowerCase().replace(/[’‘’`]/g, "'");
    const c = correct.trim().toLowerCase().replace(/[’‘’`]/g, "'");
    const isCorrect = u === c;
    
    const fb = document.getElementById('feedback');
    const hint = document.getElementById('typo-hint');
    
    if(isCorrect) {
        fb.innerText = '✨ 正確！'; fb.className = 'success'; state.score++;
        if(btn) btn.style.background = 'var(--success)';
        // 紀錄掌握度
        if(!masteredDB.includes(item.t)) { masteredDB.push(item.t); localStorage.setItem('atayal_mastered_v3', JSON.stringify(masteredDB)); }
    } else {
        fb.innerText = `❌ 錯誤。正確答案：${correct}`; fb.className = 'wrong';
        if(btn) btn.style.background = '#e74c3c';
        // 紀錄錯題
        if(!mistakesDB[item.t]) mistakesDB[item.t] = { ...item, count: 0 };
        mistakesDB[item.t].count++;
        localStorage.setItem('atayal_mistakes_v3', JSON.stringify(mistakesDB));
        
        // 容錯檢查
        if(u.length > 2 && getLevenshtein(u, c) <= 1) hint.innerText = '💡 很接近了！差一個字就對了。';
    }
    
    document.getElementById('next-btn').innerText = '下一項 (Enter)';
    updateStats();
}

function generateOptions(correct) {
    let pool = ALL_WORDS.map(w => w.t);
    let res = new Set([correct]);
    while(res.size < 4) res.add(pool[Math.floor(Math.random()*pool.length)]);
    return shuffle([...res]);
}

function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }
function handlePrev() { if(state.idx > 0) { state.idx--; renderStep(); } }
function handleNext() { state.idx++; renderStep(); }
function exitGame() { document.getElementById('game-area').style.display='none'; document.getElementById('setup-area').style.display='flex'; updateStats(); }

</script>
</body>
</html>
